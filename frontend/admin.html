<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PropScope — 관리자 전용 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <style>
        .admin-main { padding: 100px 40px; min-height: 100vh; background: #000; }
        .admin-container { max-width: 1200px; margin: 0 auto; }
        
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: #1a1a1a; padding: 25px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-card .label { font-size: 13px; color: #888; margin-bottom: 10px; }
        .stat-card .value { font-size: 28px; font-weight: 700; color: var(--primary-color); }
        
        .user-table-box { background: #1a1a1a; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .table-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255,255,255,0.02); text-align: left; padding: 15px 20px; font-size: 12px; color: #666; font-weight: 600; text-transform: uppercase; }
        td { padding: 15px 20px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 32px; height: 32px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #aaa; }
        
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
        .status-badge.active { background: rgba(0, 230, 118, 0.1); color: #00e676; }
        .status-badge.pro { background: rgba(124, 77, 255, 0.1); color: var(--primary-color); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/config.js"></script>
    <script>
        const supabaseClient = window.supabase ? window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY) : null;
        
        async function checkAdmin() {
            if (!supabaseClient) return;
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user || (!user.email.includes('admin') && user.email !== 'kinjungho@youngja.ai')) {
                alert("대표님! 관리자만 들어올 수 있는 비밀 공간이에요! 😍");
                location.href = "index.html";
            }
        }
        document.addEventListener("DOMContentLoaded", checkAdmin);
    </script>
</head>
<body>

    <header class="glass-header">
        <div class="logo">PropScope <span style="font-size: 14px; font-weight: normal; color: #888; margin-left: 10px;">관리자 전용 대시보드</span></div>
        <div style="margin-left: auto; display: flex; gap: 10px;">
            <button onclick="location.href='index.html'" class="btn-pdf">🗺️ 홈으로</button>
            <button onclick="if(supabaseClient) supabaseClient.auth.signOut(); location.href='index.html';" class="btn-pdf" style="background: #FF4B4B; color: white; border: none;">로그아웃 🚪</button>
        </div>
    </header>

    <main class="admin-main">
        <div class="admin-container">
            <h2 style="margin-bottom: 30px; font-size: 28px;">👑 대표님, 환영합니다!</h2>
            
            <div class="stat-grid">
                <div class="stat-card">
                    <p class="label">전체 활성 회원</p>
                    <p class="value">1,248명</p>
                </div>
                <div class="stat-card">
                    <p class="label">오늘 생성된 리포트</p>
                    <p class="value">42건</p>
                </div>
                <div class="stat-card">
                    <p class="label">프리미엄 구독자</p>
                    <p class="value">156명</p>
                </div>
                <div class="stat-card">
                    <p class="label">총 매출 (누적)</p>
                    <p class="value">₩2,450,000</p>
                </div>
            </div>

            <div class="user-table-box">
                <div class="table-header">
                    <h3 style="font-size: 18px;">👥 사용자 리스트 관리</h3>
                    <input type="text" placeholder="검색 또는 필터링" style="width: 250px; padding: 8px 12px; font-size: 13px;">
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>사용자</th>
                            <th>상태</th>
                            <th>마지막 검색일</th>
                            <th>리포트 발행수</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <div class="user-info">
                                    <div class="user-avatar">KJ</div>
                                    <div>
                                        <div style="font-weight: 600;">대표님 (kinjungho)</div>
                                        <div style="font-size: 12px; color: #666;">kinjungho@youngja.ai</div>
                                    </div>
                                </div>
                            </td>
                            <td><span class="status-badge pro">PREMIUM</span></td>
                            <td>오늘 오전 10:30</td>
                            <td>124건</td>
                            <td><button style="background: transparent; border: none; color: #555; cursor: pointer;">수정</button></td>
                        </tr>
                        <!-- 추가 샘플 데이터 -->
                        <tr>
                            <td>
                                <div class="user-info">
                                    <div class="user-avatar">SY</div>
                                    <div>
                                        <div style="font-weight: 600;">박서연</div>
                                        <div style="font-size: 12px; color: #666;">seoyeon@naver.com</div>
                                    </div>
                                </div>
                            </td>
                            <td><span class="status-badge active">STANDARD</span></td>
                            <td>어제 오후 2:15</td>
                            <td>12건</td>
                            <td><button style="background: transparent; border: none; color: #555; cursor: pointer;">수정</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

</body>
</html>
