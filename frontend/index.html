<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PropScope — 1인 프리미엄 시세 분석기</title>
    <!-- Google Fonts -->
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

    <div class="app-layout">
        <!-- 📍 Left Floating Panel -->
        <aside class="side-panel">
            <!-- Header inside sidebar -->
            <header class="panel-header">
                <h1 class="logo">PropScope <i class="fas fa-gem" style="font-size: 14px; color: #3B82F6;"></i></h1>
                <div class="nav-links">
                    <button class="nav-link">아파트</button>
                    <button class="nav-link active">빌라·주택</button>
                    <button class="nav-link">오피스텔</button>
                </div>
            </header>

            <div class="panel-scroll">
                <!-- Search Box -->
                <div class="search-container">
                    <div class="search-bar">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="inputRegion" placeholder="동, 지역, 지하철역 검색 (예: 공덕동)" value="마포구 공덕동">
                    </div>
                </div>

                <!-- Welcome Board -->
                <div class="welcome-box">
                    <div class="weather-info">
                        <h2>시세 집중 탐색</h2>
                        <span class="badge highlight">AI 분석 중</span>
                    </div>
                    <p class="subtitle">대표님을 위한 압도적인 데이터 스코프</p>
                </div>

                <!-- Filters -->
                <div class="filter-section">
                    <h3 class="section-title">주거 형태 <span>(다중 선택)</span></h3>
                    <div class="toggle-group">
                        <button class="toggle active" data-type="빌라">빌라 (다세대)</button>
                        <button class="toggle active" data-type="오피스텔">오피스텔</button>
                    </div>
                </div>

                <div class="filter-section">
                    <h3 class="section-title">매매가 <span>(단위: 만원)</span></h3>
                    <div class="range-inputs">
                        <div class="input-wrap">
                            <input type="number" id="priceMin" value="5000" step="1000">
                            <span class="input-label">최소</span>
                        </div>
                        <span class="dash">-</span>
                        <div class="input-wrap">
                            <input type="number" id="priceMax" value="80000" step="1000">
                            <span class="input-label">최대</span>
                        </div>
                    </div>
                </div>

                <div class="filter-section half-grid">
                    <div>
                       <h3 class="section-title">전용면적 <span>(㎡)</span></h3>
                       <div class="range-inputs narrow-inputs">
                           <div class="input-wrap"><input type="number" id="areaMin" value="15"></div>
                           <span class="dash">-</span>
                           <div class="input-wrap"><input type="number" id="areaMax" value="100"></div>
                       </div>
                    </div>
                    <div>
                       <h3 class="section-title">준공연도 <span>(이후)</span></h3>
                       <div class="slider-wrap">
                           <input type="range" id="buildYear" min="1980" max="2024" value="2000" oninput="document.getElementById('yearVal').innerText = this.value + '년'">
                           <div class="range-val" id="yearVal">2000년</div>
                       </div>
                    </div>
                </div>

                <!-- Action Button -->
                <div class="action-section">
                    <button id="btnSearch" class="btn-primary">
                        <i class="fas fa-crosshairs"></i> 정밀 시세 조회 시작
                    </button>
                    <button id="btnDownloadPdf" class="btn-secondary">
                        <i class="fas fa-file-pdf"></i> 분석 리포트 PDF 저장
                    </button>
                </div>
            </div>
            
            <!-- List Trigger (Bottom Sticky) -->
            <div class="list-summary" id="listHandle">
                <div class="summary-text">
                    <i class="fas fa-list-ul"></i>
                    <span id="itemCount">전체 카탈로그 열기</span>
                </div>
                <i class="fas fa-chevron-up chevron"></i>
            </div>
        </aside>

        <!-- 🗺️ Main Map Area -->
        <main class="map-view">
            <!-- Map Container -->
            <div id="map" class="map-container"></div>
            
            <!-- Floating Stats Card (Overlay on Map) -->
            <div id="statsPanel" class="floating-stats" style="display: none;">
                <h3><i class="fas fa-chart-pie" style="color:var(--primary)"></i> 통합 데이터 브리핑</h3>
                <div class="stat-grid">
                    <div class="stat-box">
                        <span class="label">지역 평균가</span>
                        <span class="val" id="statAvgPrice">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="label">최대 갭차이</span>
                        <span class="val highlight" id="statGap">0</span>
                    </div>
                </div>
                <div class="stat-footer">
                    <span>최저/최고금액: <b id="statMinMax">0/0</b></span>
                    <p id="statGapNote" class="gap-note">데이터가 충분합니다.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- 📋 Slide-up List Modal -->
    <div id="listView" class="list-view-modal">
        <div class="modal-header">
            <h3><i class="fas fa-building" style="color:var(--primary); margin-right:8px;"></i> 상세 매물 카탈로그</h3>
            <button class="btn-close" id="listClose"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <table id="propertyTable" class="premium-table">
                <thead>
                    <tr>
                        <th>플랫폼</th>
                        <th>유형</th>
                        <th>매물명</th>
                        <th>매매금액</th>
                        <th>면적 (㎡)</th>
                        <th>해당층</th>
                        <th>준공년도</th>
                    </tr>
                </thead>
                <tbody id="propertyList">
                    <!-- Data here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Kakao Map SDK -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=882a712230678852cb0e6c255561ea08&libraries=services,clusterer"></script>
    <script src="assets/config.js"></script>
    <script src="assets/app.js"></script>
</body>
</html>
